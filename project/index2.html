<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Siêu Tốc - Fix Lỗi Lệch Hình</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #000;
    }

    #start-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, #1a1a1a, #000);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      cursor: pointer;
    }

    #start-btn {
      padding: 20px 70px;
      font-size: 22px;
      background: #e91e63;
      border: none;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      box-shadow: 0 10px 40px rgba(233, 30, 99, 0.5);
      margin-top: 25px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #scanning-status {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 12px 35px;
      border-radius: 40px;
      font-size: 14px;
      z-index: 100;
      border: 1px solid rgba(233, 30, 99, 0.3);
      backdrop-filter: blur(15px);
      display: none;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <div style="font-size: 28px; font-weight: bold; color: #e91e63;">TRẢI NGHIỆM AR</div>
    <p style="margin: 15px 0; color: #888; max-width: 80%;">Hướng camera vào ảnh để xem video tương ứng</p>
    <button id="start-btn">Bắt đầu ngay</button>
  </div>

  <div id="scanning-status">Đang quét tìm hình ảnh...</div>

  <!-- 
    ĐIỀU CHỈNH CHỐNG RUNG CÂN BẰNG:
    - filterMinCF: 0.001 (Tăng nhẹ để video bám sát ảnh hơn, giảm độ trễ)
    - filterBeta: 10 (Giảm để tránh hiệu ứng video "đuổi theo" ảnh quá chậm)
    - warmupTolerance: 7 (Đợi nhận diện ổn định trong 7 khung hình mới hiện video)
  -->
  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 10; warmupTolerance: 7; missTolerance: 10;" 
    color-space="sRGB" 
    renderer="colorManagement: true, antialias: true, precision: high, logarithmicDepthBuffer: true;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="ar-video" 
             src="video.mp4" 
             crossorigin="anonymous" 
             loop="true" 
             autoplay="false"
             muted="true"
             playsinline 
             webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="targets-container"></a-entity>
    
  </a-scene>

  <script>
    const TOTAL_IMAGES = 28;
    const sceneEl = document.querySelector('a-scene');
    const videoEl = document.querySelector('#ar-video');
    const container = document.querySelector('#targets-container');
    const statusLabel = document.querySelector("#scanning-status");
    const startOverlay = document.querySelector("#start-overlay");

    const fragment = document.createDocumentFragment();
    for (let i = 0; i < TOTAL_IMAGES; i++) {
      const targetEntity = document.createElement('a-entity');
      targetEntity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
      
      const videoPlane = document.createElement('a-video');
      videoPlane.setAttribute('src', '#ar-video');
      
      /* QUAN TRỌNG: Không ép cứng chiều cao quá nhiều. 
         Chúng ta sử dụng width=1 làm chuẩn, height sẽ tự thích ứng theo tỷ lệ ảnh mục tiêu 
         được định nghĩa trong file .mind
      */
      videoPlane.setAttribute('width', '1');
      videoPlane.setAttribute('height', '1.45'); // Tỉ lệ xấp xỉ Portrait
      videoPlane.setAttribute('position', '0 0 0.01'); 
      
      targetEntity.appendChild(videoPlane);

      targetEntity.addEventListener("targetFound", () => {
        statusLabel.innerText = "Đã nhận diện: Ảnh " + (i + 1);
        statusLabel.style.borderColor = "#e91e63";
        
        videoEl.muted = false;
        videoEl.play().catch(() => {
          videoEl.muted = true;
          videoEl.play();
        });
      });

      targetEntity.addEventListener("targetLost", () => {
        videoEl.pause();
        statusLabel.innerText = "Đang tìm hình ảnh...";
        statusLabel.style.borderColor = "rgba(233, 30, 99, 0.3)";
      });

      fragment.appendChild(targetEntity);
    }
    container.appendChild(fragment);

    startOverlay.addEventListener("click", () => {
      startOverlay.style.opacity = "0";
      setTimeout(() => { startOverlay.style.display = "none"; }, 400);
      statusLabel.style.display = "block";
      
      sceneEl.systems["mindar-image-system"].start();
      
      videoEl.load();
      videoEl.play().then(() => {
        videoEl.pause();
        videoEl.currentTime = 0;
      });
    });

    sceneEl.addEventListener("arError", () => {
      statusLabel.innerText = "Lỗi khởi tạo AR!";
      statusLabel.style.background = "#d32f2f";
    });
  </script>
</body>
</html>
