<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trái Tim Từ Ảnh - Mở Khóa</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary-color: #ff4d6d;
      --bg-color: #0b0118;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: white;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Background Stars */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
    }

    /* Login Overlay */
    #loginOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 1, 24, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 2.5rem;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 77, 109, 0.3);
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 77, 109, 0.2);
      width: 90%;
      max-width: 400px;
    }

    h2 {
      font-family: 'Pacifico', cursive;
      color: var(--primary-color);
      margin-bottom: 1.5rem;
      font-size: 2rem;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 1.5rem;
      border-radius: 10px;
      border: 1px solid #ff4d6d;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }

    button {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, background 0.3s;
      width: 100%;
      font-size: 1.1rem;
    }

    button:hover {
      background: #ff758f;
      transform: scale(1.05);
    }

    .error-msg {
      color: #ffb3c1;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    /* Heart & Original Elements (Hidden until login if needed) */
    .container {
      display: none; /* Hiện sau khi mở khóa nếu không chuyển trang */
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="stars" id="starField"></div>

  <!-- Màn hình khóa -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2>Chào Công Chúa</h2>
      <p style="margin-bottom: 20px; font-size: 0.9rem; opacity: 0.8;">Nhập đầy đủ họ tên để nhận quà nhé!</p>
      <input type="text" id="userNameInput" placeholder="Ví dụ: Nguyễn Thị A" autocomplete="off">
      <button onclick="handleUnlock()">Mở Khóa</button>
      <div id="errorMessage" class="error-msg">Tên này không có trong danh sách quà tặng rồi...</div>
    </div>
  </div>

  <div class="container" id="heartContainer"></div>
  <div id="messageContainer"></div>

  <script>
    // Danh sách 28 tên và link tương ứng
    const userDatabase = {
      "12A4": "https://finn1308.github.io/kyniemqua/",
      
    };

    function handleUnlock() {
      const inputName = document.getElementById('userNameInput').value.trim();
      const errorDiv = document.getElementById('errorMessage');

      // Tìm kiếm không phân biệt hoa thường và khoảng trắng thừa
      const foundName = Object.keys(userDatabase).find(
        key => key.toLowerCase() === inputName.toLowerCase()
      );

      if (foundName) {
        errorDiv.style.display = 'none';
        // Thêm hiệu ứng mờ dần trước khi chuyển trang
        document.getElementById('loginOverlay').style.opacity = '0';
        
        setTimeout(() => {
          window.location.href = userDatabase[foundName];
        }, 500);
      } else {
        errorDiv.style.display = 'block';
        // Hiệu ứng rung nhẹ khi sai
        const box = document.querySelector('.login-box');
        box.style.animation = 'shake 0.3s ease-in-out';
        setTimeout(() => box.style.animation = '', 300);
      }
    }

    // Cho phép bấm Enter để mở khóa
    document.getElementById('userNameInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        handleUnlock();
      }
    });

    // Tạo hiệu ứng sao nền
    function createStars() {
      const starField = document.getElementById('starField');
      for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.style.position = 'absolute';
        star.style.width = Math.random() * 3 + 'px';
        star.style.height = star.style.width;
        star.style.background = 'white';
        star.style.borderRadius = '50%';
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        star.style.opacity = Math.random();
        star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite`;
        starField.appendChild(star);
      }
    }

    // CSS cho hiệu ứng rung và lấp lánh
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    `;
    document.head.appendChild(styleSheet);

    window.onload = createStars;
  </script>
</body>
</html>
