<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A4K41 - Chào Mừng</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: black;
      font-family: 'Poppins', sans-serif;
      touch-action: none; /* Ngăn chặn các thao tác chạm mặc định gây lag */
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #bear {
      position: absolute;
      left: 10px;
      bottom: 20px;
      width: 80px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }

    /* CSS cho Pop-up */
    #popupOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 1, 24, 0.85);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.8s ease;
      backdrop-filter: blur(8px);
    }

    .login-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 2rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 77, 109, 0.3);
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 77, 109, 0.2);
      width: 85%;
      max-width: 350px;
      color: white;
    }

    .login-box h2 {
      font-family: 'Pacifico', cursive;
      color: #ff4d6d;
      margin-bottom: 1rem;
      font-size: 1.8rem;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 1.2rem;
      border-radius: 10px;
      border: 1px solid #ff4d6d;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }

    .login-box button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      transition: background 0.3s;
    }

    .error-msg {
      color: #ffb3c1;
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <img id="bear" src="https://i.pinimg.com/originals/e5/c5/4c/e5c54cd43fd75a7ec5b7cf0f65838ec3.gif" alt="Bear" />

  <div id="popupOverlay">
    <div class="login-box">
      <h2>Chào Công Chúa</h2>
      <p style="margin-bottom: 15px; font-size: 0.85rem; opacity: 0.8;">Nhập mã lớp mình để nhận quà nhé!</p>
      <input type="text" id="userNameInput" placeholder="Nhập mã lớp (Ví dụ: 12A4)" autocomplete="off">
      <button onclick="handleUnlock()">Mở Khóa</button>
      <div id="errorMessage" class="error-msg">Mã không chính xác, thử lại nhé!</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Tối ưu hóa render
    const stars = [];
    const explosions = [];
    const shootingStars = [];
    const fullText = ["Chào Mừng đến với A4K41", "chúng tớ là học sinh 12A4"];
    
    let fontSize = 40;
    let lineHeight = 60;
    const bearX = 50;
    let bearY = 0;
    let dots = [];
    let targetDotsQueue = [];
    let currentCharIndex = 0;
    let animationDone = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      bearY = canvas.height - 70;

      // Điều chỉnh font size theo chiều rộng màn hình
      fontSize = Math.min(canvas.width / 10, 60);
      lineHeight = fontSize * 1.5;

      stars.length = 0;
      const starCount = canvas.width < 600 ? 150 : 300;
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.2 + 0.3,
          alpha: Math.random(),
          delta: (Math.random() * 0.01) + 0.005
        });
      }
      
      // Khởi động lại logic tọa độ chữ khi resize
      if (!animationDone) {
        generateAllTargetDots();
      }
    }

    window.addEventListener('resize', resizeCanvas);

    function createExplosion(x, y) {
      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        explosions.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 40,
          opacity: 1
        });
      }
    }

    function drawStars() {
      ctx.fillStyle = "white";
      for (let star of stars) {
        star.alpha += star.delta;
        if (star.alpha >= 1 || star.alpha <= 0) star.delta = -star.delta;
        ctx.globalAlpha = Math.max(0, star.alpha);
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function createShootingStar() {
      if (shootingStars.length > 2) return;
      shootingStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * (canvas.height / 2),
        length: Math.random() * 150 + 50,
        speed: Math.random() * 8 + 4,
        angle: Math.PI / 4,
        opacity: 1
      });
    }

    function drawShootingStars() {
      ctx.lineWidth = 1.5;
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        const endX = s.x - Math.cos(s.angle) * s.length;
        const endY = s.y - Math.sin(s.angle) * s.length;
        ctx.strokeStyle = `rgba(255, 255, 255, ${s.opacity})`;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        s.x += Math.cos(s.angle) * s.speed;
        s.y += Math.sin(s.angle) * s.speed;
        s.opacity -= 0.02;
        if (s.opacity <= 0) shootingStars.splice(i, 1);
      }
    }

    function generateCharDots(char, x, y) {
      const tempCanvas = document.createElement('canvas');
      const tCtx = tempCanvas.getContext('2d');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tCtx.font = `bold ${fontSize}px Arial`;
      tCtx.fillStyle = "red";
      tCtx.textAlign = "left";
      tCtx.fillText(char, x, y);
      
      const imageData = tCtx.getImageData(0, 0, canvas.width, canvas.height).data;
      const charDots = [];
      const step = canvas.width < 600 ? 6 : 4; // Mobile dùng bước nhảy lớn hơn để mượt
      
      for (let py = 0; py < canvas.height; py += step) {
        for (let px = 0; px < canvas.width; px += step) {
          if (imageData[(py * canvas.width + px) * 4 + 3] > 128) {
            charDots.push({ x: px, y: py });
          }
        }
      }
      return charDots;
    }

    function generateAllTargetDots() {
      const tempCtx = document.createElement('canvas').getContext('2d');
      tempCtx.font = `bold ${fontSize}px Arial`;
      const lines = fullText;
      const totalHeight = lines.length * lineHeight;
      const startY = (canvas.height - totalHeight) / 2 + fontSize;
      
      targetDotsQueue = [];
      lines.forEach((line, lineIndex) => {
        const lineWidth = tempCtx.measureText(line).width;
        let xCursor = (canvas.width - lineWidth) / 2;
        const y = startY + lineIndex * lineHeight;
        for (let char of line) {
          if (char === " ") {
            xCursor += tempCtx.measureText(" ").width;
            targetDotsQueue.push([]);
            continue;
          }
          targetDotsQueue.push(generateCharDots(char, xCursor, y));
          xCursor += tempCtx.measureText(char).width;
        }
      });
    }

    function shootDot() {
      if (animationDone) return;
      while (currentCharIndex < targetDotsQueue.length && targetDotsQueue[currentCharIndex].length === 0) {
        currentCharIndex++;
      }
      const targetDots = targetDotsQueue[currentCharIndex];
      if (!targetDots || targetDots.length === 0) return;

      const batch = canvas.width < 600 ? 5 : 10;
      for (let i = 0; i < batch; i++) {
        const target = targetDots.shift();
        if (!target) break;
        dots.push({
          x: bearX + 40,
          y: bearY,
          vx: (Math.random() - 0.5) * 5,
          vy: -Math.random() * 5,
          targetX: target.x,
          targetY: target.y,
          size: Math.random() * 8 + 8
        });
      }
    }

    function animate() {
      // Vẽ nền tối ưu
      ctx.fillStyle = "#0a001f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawStars();
      drawShootingStars();

      ctx.font = "14px Arial";
      ctx.textAlign = "center";
      
      for (let i = dots.length - 1; i >= 0; i--) {
        const d = dots[i];
        const dx = d.targetX - d.x;
        const dy = d.targetY - d.y;
        
        d.vx += dx * 0.004;
        d.vy += dy * 0.004;
        d.vx *= 0.9;
        d.vy *= 0.9;
        d.x += d.vx;
        d.y += d.vy;
        
        ctx.fillText("❤️", d.x, d.y);
      }

      for (let i = explosions.length - 1; i >= 0; i--) {
        const p = explosions[i];
        p.x += p.vx; p.y += p.vy;
        p.opacity -= 0.02;
        ctx.globalAlpha = Math.max(p.opacity, 0);
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
        if (p.opacity <= 0) explosions.splice(i, 1);
      }
      ctx.globalAlpha = 1;

      // Kiểm tra hoàn tất
      if (!animationDone && currentCharIndex >= targetDotsQueue.length && targetDotsQueue[targetDotsQueue.length-1]?.length === 0) {
        const allSettled = dots.every(d => Math.abs(d.x - d.targetX) < 10 && Math.abs(d.y - d.targetY) < 10);
        if (allSettled && dots.length > 0) showPopup();
      }

      requestAnimationFrame(animate);
    }

    function showPopup() {
      animationDone = true;
      document.getElementById("bear").src = "https://i.pinimg.com/originals/7e/f6/9c/7ef69cd0a6b0b78526c8ce983b3296fc.gif";
      const popup = document.getElementById("popupOverlay");
      popup.style.display = "flex";
      setTimeout(() => popup.style.opacity = "1", 100);
    }

    const userDatabase = { "12A4": "project/index2.html" };

    function handleUnlock() {
      const input = document.getElementById('userNameInput').value.trim().toUpperCase();
      const errorDiv = document.getElementById('errorMessage');
      
      if (userDatabase[input]) {
        errorDiv.style.display = 'none';
        document.getElementById('popupOverlay').style.opacity = '0';
        setTimeout(() => window.location.href = userDatabase[input], 500);
      } else {
        errorDiv.style.display = 'block';
        const box = document.querySelector('.login-box');
        box.style.animation = 'shake 0.3s ease-in-out';
        setTimeout(() => box.style.animation = '', 300);
      }
    }

    document.getElementById('userNameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleUnlock();
    });

    window.onload = () => {
      resizeCanvas();
      generateAllTargetDots();
      setInterval(shootDot, 30);
      setInterval(createShootingStar, 3000);
      animate();
    };

    canvas.addEventListener("click", (e) => createExplosion(e.clientX, e.clientY));
  </script>
</body>
</html>
